name: CI - Sanity Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-v2-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-v2-

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (non-generated files)
        run: |
          find lib $([ -d test ] && echo test) \
            -name "*.dart" ! -name "*.g.dart" ! -name "*.freezed.dart" \
            -type f -print0 \
            | xargs -0 dart format --output=none --set-exit-if-changed

      - name: Analyze code (fail on errors only)
        run: |
          # We intentionally do not gate on warnings — the upstream Plezy fork
          # leaves many inherited `unnecessary_non_null_assertion`/`unused_import`
          # findings that are unrelated to day-to-day work. Errors remain blocking.
          flutter analyze 2>&1 | tee analyze_output.txt || true
          if grep -q "error •" analyze_output.txt; then
            echo "::error::flutter analyze reported errors"
            exit 1
          fi
          echo "✅ analyze clean (warnings/info are allowed)"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-v2-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-v2-

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests (if any)
        run: |
          if [ -d test ] && [ "$(find test -name '*_test.dart' | wc -l)" -gt 0 ]; then
            flutter test
          else
            echo "No tests found, skipping."
          fi
